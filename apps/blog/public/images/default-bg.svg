    <line x1="700" y1="200" x2="800" y2="480"/>
    <line x1="950" y1="350" x2="1050" y2="600"/>
    <line x1="1200" y1="250" x2="1300" y2="520"/>
    <line x1="550" y1="550" x2="650" y2="720"/>
    <line x1="800" y1="480" x2="900" y2="850"/>
    <line x1="1050" y1="600" x2="1150" y2="770"/>
    <line x1="1300" y1="520" x2="1400" y2="900"/>
    <line x1="200" y1="150" x2="300" y2="450"/>
    <line x1="1700" y1="300" x2="1800" y2="570"/>
    <line x1="1450" y1="380" x2="1550" y2="650"/>
