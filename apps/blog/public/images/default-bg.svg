    <line x1="300" y1="450" x2="550" y2="550"/>
    <line x1="550" y1="550" x2="800" y2="480"/>
    <line x1="800" y1="480" x2="1050" y2="600"/>
    <line x1="1050" y1="600" x2="1300" y2="520"/>
    <line x1="1300" y1="520" x2="1550" y2="650"/>
    <line x1="1550" y1="650" x2="1800" y2="570"/>
    <line x1="150" y1="700" x2="400" y2="800"/>
    <line x1="400" y1="800" x2="650" y2="720"/>
    <line x1="650" y1="720" x2="900" y2="850"/>
