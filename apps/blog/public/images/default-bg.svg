  <!-- Nodes -->
  <g fill="#818cf8" fill-opacity="0.6">
    <circle cx="200" cy="150" r="4"/>
    <circle cx="450" cy="280" r="5"/>
    <circle cx="700" cy="200" r="4"/>
    <circle cx="950" cy="350" r="6"/>
    <circle cx="1200" cy="250" r="4"/>
    <circle cx="1450" cy="380" r="5"/>
    <circle cx="1700" cy="300" r="4"/>
    <circle cx="300" cy="450" r="4"/>
    <circle cx="550" cy="550" r="5"/>
    <circle cx="800" cy="480" r="4"/>
    <circle cx="1050" cy="600" r="6"/>
    <circle cx="1300" cy="520" r="4"/>
    <circle cx="1550" cy="650" r="5"/>
    <circle cx="1800" cy="570" r="4"/>
    <circle cx="150" cy="700" r="4"/>
    <circle cx="400" cy="800" r="5"/>
    <circle cx="650" cy="720" r="4"/>
    <circle cx="900" cy="850" r="6"/>
    <circle cx="1150" cy="770" r="4"/>
    <circle cx="1400" cy="900" r="5"/>
    <circle cx="1650" cy="820" r="4"/>
