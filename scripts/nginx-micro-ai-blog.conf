# 新 nginx 站点配置：所有 /api 改由 blog:3000 处理（Hono 暂不对外暴露）
# 应用命令：
#   sudo cp scripts/nginx-micro-ai-blog.conf /etc/nginx/sites-available/micro-ai-blog
#   sudo nginx -t && sudo systemctl reload nginx
#
# 变更：
#   - 移除 /api → 3010 (Hono) 的直通
#   - /api 默认代理到 3000 (blog Next.js)，修复博客后台登录/上传/发布等写 API 404
#   - 为 SSE 路由 (assistant) 关闭 proxy_buffering + 延长 proxy_read_timeout

server {
    server_name huweiastar.deepai.icu;

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # SSE (assistant chat / write / assist) 需要关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/huweiastar.deepai.icu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/huweiastar.deepai.icu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = huweiastar.deepai.icu) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name huweiastar.deepai.icu;
    return 404; # managed by Certbot


}
