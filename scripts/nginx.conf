server {
    listen 80;
    server_name huweiastar.cn www.huweiastar.cn;

    # HTTP 自动跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name huweiastar.cn www.huweiastar.cn;

    # SSL 证书配置（使用 Certbot 自动生成）
    ssl_certificate /etc/letsencrypt/live/huweiastar.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/huweiastar.cn/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头（X-XSS-Protection 已被各大浏览器废弃且可能引入风险，故移除；
    # HSTS/CSP/Referrer-Policy/Permissions-Policy 由 Next.js next.config.mjs 统一下发）
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # 反向代理到 Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 限制上传文件大小
    client_max_body_size 10M;
}
