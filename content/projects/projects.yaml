- slug: "spark-dedup"
  name: "Spark 亿级数据去重项目"
  description: "基于 MinHash + LSH 算法实现亿级文档的近似重复检测，将处理时间从数天缩短到数小时。"
  cover: "/images/projects/spark-dedup.png"
  techStack:
    - Spark
    - Scala
    - MinHash
    - LSH
    - Hive
  githubUrl: "https://github.com/huweiastar/spark-dedup"
  highlights:
    - 支持 10 亿级文档去重
    - 分布式 MinHash 计算
    - 去重准确率达 95%+
  details:
    background: "大数据场景下，海量文本数据中存在大量重复或近似重复内容，需要高效去重。"
    problem: "精确去重需要 O(n²) 复杂度，无法处理亿级数据。MinHash + LSH 近似算法可以大幅降低计算量。"
    solution: "基于 Spark 分布式实现 MinHash + LSH 算法，将文档分桶后进行桶内精确比较。"
    results: "处理 10 亿文档，去重时间从数天缩短到数小时，准确率 95%+。"
  relatedPosts:
    - "spark-data-skew"
  codeIndex:
    enabled: false

- slug: "ai-tech-blog"
  name: "个人技术博客系统"
  description: "基于 Next.js + TypeScript + Tailwind CSS 构建的个人技术博客系统，支持 MDX、分类标签、全文搜索、SEO 优化和自动化部署。"
  cover: "/images/projects/ai-tech-blog.png"
  techStack:
    - Next.js
    - TypeScript
    - Tailwind CSS
    - MDX
    - Fuse.js
    - GitHub Actions
  githubUrl: "https://github.com/huweiastar/ai-tech-blog"
  demoUrl: "https://ai-tech-blog.vercel.app"
  highlights:
    - 完整的 MDX 文章系统
    - 全文搜索和分类标签
    - SEO 优化和 RSS 支持
    - GitHub Actions 自动部署
  details:
    background: "需要一个个人技术博客来分享大数据和大模型技术经验。"
    problem: "现有博客平台功能受限，自定义程度低。自建博客需要完整的 MDX 渲染、搜索、SEO 等功能。"
    solution: "基于 Next.js App Router 构建，使用 MDX 渲染、Fuse.js 全文搜索、Tailwind CSS 样式和 GitHub Actions 自动化部署。"
    results: "实现完整的个人技术博客系统，支持暗色模式、全文搜索、SEO 优化、RSS 订阅等功能。"
  relatedPosts: []
  codeIndex:
    enabled: true
    sourceType: "local"
    localPath: "."
    include:
      - "app/**"
      - "lib/**"
      - "components/**"
      - "README.md"
    exclude:
      - "node_modules/**"
      - ".next/**"
      - ".env*"
