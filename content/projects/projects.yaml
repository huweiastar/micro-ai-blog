- slug: "llm-data-cleaning"
  name: "大模型训练数据清洗平台"
  description: "基于 Python 和 Spark 构建的大模型训练数据清洗流程，支持文本去重、低质量过滤、敏感信息识别和格式规范化。"
  cover: "/images/projects/llm-data-cleaning.png"
  techStack:
    - Python
    - Spark
    - Hive
    - MinHash
    - SimHash
    - FastText
  githubUrl: "https://github.com/huweiastar/llm-data-cleaning"
  highlights:
    - 支持亿级文本数据清洗
    - 实现文档级和段落级去重
    - 支持规则过滤和模型过滤结合
    - 输出符合 SFT 格式的数据集
  details:
    background: "大模型训练质量高度依赖训练数据质量。原始数据通常包含重复内容、低质量文本和敏感信息，需要系统化清洗。"
    problem: "传统数据清洗方案难以处理海量文本数据，MinHash 近似去重和 SimHash 指纹在大规模场景下性能不足。"
    solution: "基于 Spark 分布式计算构建数据清洗 Pipeline，结合规则过滤、统计过滤和模型过滤的多阶段策略。"
    results: "实现亿级文档的高效去重和清洗，数据质量显著提升，训练效率提高 30%。"
  relatedPosts:
    - "llm-data-cleaning"
  codeIndex:
    enabled: false

